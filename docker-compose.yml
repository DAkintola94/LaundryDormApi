services:
  laundrydormapi:
    build:
      context: .
      dockerfile: LaundryDormApi/Dockerfile
    restart: unless-stopped
    volumes:
      - /home/ubuntu/app/ServerImages:/app/ServerImages #Creating a live link (bind mount) between the VM app serverimages, and container app/serverimages
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DbContextConnection=Server=mariadb;Database=LaundryDormBase;User=root;Password=${MYSQL_ROOT_PASSWORD}
      - ConnectionStrings__AuthContextConnection=Server=mariadb;Database=LaundryDormAuthDb;User=root;Password=${MYSQL_ROOT_PASSWORD}
    labels:
      - "traefik.enable=true"

      # Backend → /api
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`) || PathPrefix(`/ServerImages`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.routers.backend.priority=100"

      # Backend internal port
      - "traefik.http.services.backend.loadbalancer.server.port=8080"

      - "traefik.docker.network=atlas_network"
    networks:
      - atlas_network

  laundrydormfrontend:
    build:
      context: ./LaundryDormReact/laundrydorm_vite
      dockerfile: Dockerfile
      args:
        # IMPORTANT: use IP for now (no domain yet)
        VITE_API_BASE_URL: http://141.145.214.18/api
    restart: unless-stopped
    labels:
      - "traefik.enable=true"

      # Frontend → everything else
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"

      - "traefik.http.services.frontend.loadbalancer.server.port=80"

      - "traefik.docker.network=atlas_network"
    networks:
      - atlas_network
    depends_on:
      - laundrydormapi

  mariadb:
    image: mariadb:latest
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306" # optional (can remove later)
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - atlas_network

volumes:
  mariadb_data:

networks:
  atlas_network:
    external: true
